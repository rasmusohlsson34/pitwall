<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>PITWALL.EXE</title>
  <style>
    /* ── Reset & tokens ───────────────────────────────────────────────────── */
    :root {
      --bg:       #050505;
      --bg-card:  #0d0d0d;
      --bg-sel:   #111111;
      --border:   #1e1e1e;
      --green:    #39d353;
      --yellow:   #e8c133;
      --red:      #cc3333;
      --text:     #c8c8c8;
      --text-sec: #666666;
      --text-dim: #333333;
      --tab-bg:   #080808;
      --mono: 'Menlo','Consolas','Monaco','Courier New',monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); overflow: hidden; }
    body { display: flex; flex-direction: column; height: 100dvh; }

    /* ── Header ───────────────────────────────────────────────────────────── */
    #hdr {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 8px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 8px;
    }
    #hdr-title  { color: var(--green); font-size: 13px; font-weight: 700; letter-spacing: 2px; }
    #hdr-right  { text-align: right; }
    #hdr-session{ font-size: 10px; color: var(--text-sec); margin-bottom: 2px; }
    #hdr-status { font-size: 10px; letter-spacing: 1px; color: var(--text-sec); }

    /* ── Countdown bar ────────────────────────────────────────────────────── */
    #countdown-bar {
      display: none; flex-shrink: 0;
      padding: 5px 12px; border-bottom: 1px solid var(--border);
      font-size: 10px; letter-spacing: 1px;
      align-items: center; justify-content: space-between; gap: 8px;
    }
    .cd-label { color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cd-timer { color: var(--green); font-weight: 700; flex-shrink: 0; }

    /* ── Main scrollable area ─────────────────────────────────────────────── */
    #main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; position: relative; }

    /* ── Tab bar ──────────────────────────────────────────────────────────── */
    #nav { display: flex; background: var(--tab-bg); border-top: 1px solid var(--border); flex-shrink: 0; height: 56px; }
    .tab {
      flex: 1; background: none; border: none; color: #444; font-family: var(--mono);
      font-size: 12px; letter-spacing: 1.5px; cursor: pointer; padding: 0;
    }
    .tab.active { color: var(--green); }

    /* ── Loading / error screen ───────────────────────────────────────────── */
    .screen-center {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 16px; padding: 24px;
    }
    .sc-title { color: var(--green); font-size: 13px; letter-spacing: 2px; }
    .sc-status { font-size: 11px; color: var(--text-sec); text-align: center; line-height: 1.6; }
    .sc-error  { font-size: 11px; color: var(--red);      text-align: center; line-height: 1.6; }

    /* ── Empty / notice ───────────────────────────────────────────────────── */
    .empty     { display: flex; align-items: center; justify-content: center; height: 100%; }
    .empty-t   { font-size: 12px; color: var(--text-dim); letter-spacing: 1px; text-align: center; padding: 24px; }
    .notice    { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; padding: 24px; }
    .notice-t  { font-size: 13px; color: var(--text-sec); letter-spacing: 1.5px; text-align: center; }
    .notice-b  { font-size: 11px; color: var(--text-dim); text-align: center; line-height: 1.7; }

    /* ── LOG: event rows ──────────────────────────────────────────────────── */
    .ev {
      display: flex; padding: 8px 12px; border-left: 2px solid transparent;
      border-bottom: 1px solid var(--border); gap: 8px; background: var(--bg);
    }
    .ev.hi  { background: var(--bg-card); }
    .ev-meta{ width: 68px; flex-shrink: 0; }
    .ev-time{ font-size: 10px; color: var(--text-sec); letter-spacing: .5px; }
    .ev-badge{font-size: 10px; letter-spacing: 1px; }
    .ev-body{ flex: 1; min-width: 0; }
    .ev-drv { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; margin-bottom: 2px; }
    .ev-ttl { font-size: 13px; line-height: 1.4; word-break: break-word; }
    .ev-msg { font-size: 11px; color: var(--text-sec); line-height: 1.4; margin-top: 2px; }
    .ev-pip { width: 5px; height: 5px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }

    /* ── RADIO: clip rows ─────────────────────────────────────────────────── */
    .rad {
      display: flex; align-items: center; padding: 12px;
      border-left: 2px solid transparent; border-bottom: 1px solid var(--border);
      background: var(--bg-card); gap: 12px;
    }
    .rad-info { flex: 1; min-width: 0; }
    .rad-time { font-size: 10px; color: var(--text-sec); }
    .rad-drv  { font-size: 12px; font-weight: 700; letter-spacing: 1.5px; margin: 2px 0; }
    .rad-ttl  { font-size: 13px; color: var(--text); }
    .play-btn {
      width: 44px; height: 44px; flex-shrink: 0; background: none;
      border: 1px solid var(--border); font-family: var(--mono); font-size: 15px;
      cursor: pointer; border-radius: 2px; display: flex; align-items: center; justify-content: center;
    }
    .play-btn:active { background: var(--bg-sel); }

    /* ── GRID ─────────────────────────────────────────────────────────────── */
    .grid-lbl {
      display: flex; padding: 4px 12px; border-bottom: 1px solid var(--border);
      font-size: 10px; color: var(--text-dim); letter-spacing: 1px;
    }
    .drv-row {
      display: flex; align-items: center; padding: 12px;
      border-left: 2px solid transparent; border-bottom: 1px solid var(--border);
      background: var(--bg); gap: 12px; min-height: 44px;
    }
    .drv-pos  { font-size: 15px; color: var(--text-sec); width: 24px; text-align: right; flex-shrink: 0; }
    .drv-code { font-size: 15px; font-weight: 700; letter-spacing: 1.5px; width: 48px; flex-shrink: 0; }
    .drv-team { font-size: 12px; color: var(--text-sec); flex: 1; letter-spacing: .5px; }

    /* ── MENU ─────────────────────────────────────────────────────────────── */
    .menu-wrap { height: 100%; overflow-y: auto; padding: 16px 0 32px; }
    .menu-sec  { margin-bottom: 16px; }
    .menu-ttl  { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; padding: 0 12px 8px; }
    .speed-row { display: flex; padding: 0 12px; gap: 8px; margin-bottom: 8px; }
    .spd-btn {
      flex: 1; height: 44px; background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-sec); font-family: var(--mono); font-size: 13px; letter-spacing: 1px;
      cursor: pointer; border-radius: 2px;
    }
    .spd-btn.on { border-color: var(--green); color: var(--green); background: var(--bg-sel); }
    .spd-btn:active { opacity: .7; }
    .act-row { display: flex; padding: 0 12px; gap: 8px; }
    .act-btn {
      flex: 1; height: 44px; background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text); font-family: var(--mono); font-size: 13px; letter-spacing: 1px;
      cursor: pointer; border-radius: 2px;
    }
    .act-btn.danger { color: var(--red); }
    .act-btn:active { opacity: .7; }
    .tog-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 12px; min-height: 44px; border-bottom: 1px solid var(--border); cursor: pointer;
    }
    .tog-row.on { background: var(--bg-card); }
    .tog-lbl { font-size: 12px; color: var(--text-sec); letter-spacing: .5px; }
    .tog-row.on .tog-lbl { color: var(--text); }
    .tog-pip { width: 8px; height: 8px; border-radius: 50%; border: 1px solid var(--text-dim); flex-shrink: 0; }
    .tog-row.on .tog-pip { background: var(--green); border-color: var(--green); }
    .clear-btn {
      display: block; width: 100%; text-align: right; padding: 8px 12px;
      background: none; border: none; font-family: var(--mono); font-size: 10px;
      color: var(--text-sec); letter-spacing: 1px; text-decoration: underline; cursor: pointer;
    }
    .sess-row { display: flex; gap: 8px; padding: 0 12px; }
    .sess-row input {
      flex: 1; height: 44px; background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text); font-family: var(--mono); font-size: 12px; padding: 0 8px;
      border-radius: 2px; min-width: 0;
    }
    .sess-row button {
      height: 44px; padding: 0 12px; background: var(--bg-card); border: 1px solid var(--border);
      color: var(--green); font-family: var(--mono); font-size: 12px; letter-spacing: 1px;
      cursor: pointer; border-radius: 2px; white-space: nowrap;
    }
    .sess-row button:active { opacity: .7; }
  </style>
</head>
<body>

<header id="hdr">
  <div id="hdr-title">PITWALL.EXE</div>
  <div id="hdr-right">
    <div id="hdr-session"></div>
    <div id="hdr-status">LOADING...</div>
  </div>
</header>

<div id="countdown-bar">
  <span class="cd-label"></span>
  <span class="cd-timer"></span>
</div>

<main id="main">
  <div class="screen-center">
    <div class="sc-title">PITWALL.EXE</div>
    <div class="sc-status" id="boot-msg">Connecting to OpenF1...</div>
  </div>
</main>

<nav id="nav">
  <button class="tab active" data-tab="log">LOG</button>
  <button class="tab" data-tab="radio">RADIO</button>
  <button class="tab" data-tab="grid">GRID</button>
  <button class="tab" data-tab="menu">MENU</button>
</nav>

<script>
'use strict';

// ── Constants ────────────────────────────────────────────────────────────────

const API = 'https://api.openf1.org/v1';
const MAX_GAP = 8000; // ms cap between events
const P_COLOR = { 1:'#cc3333', 2:'#e8c133', 3:'#f0f0f0', 4:'#c8c8c8', 5:'#666666' };
const BADGE   = { LAP:'LAP', POSITION:'POS', RACE_CONTROL:'RC ', WEATHER:'WX ', RADIO:'RAD', SYSTEM:'SYS' };
const ALL_TYPES = [
  { label:'LAP TIMES',    v:'LAP' },
  { label:'POSITIONS',    v:'POSITION' },
  { label:'RACE CONTROL', v:'RACE_CONTROL' },
  { label:'TEAM RADIO',   v:'RADIO' },
  { label:'WEATHER',      v:'WEATHER' },
  { label:'SYSTEM',       v:'SYSTEM' },
];

// ── State ────────────────────────────────────────────────────────────────────

const S = {
  phase: 'loading',   // loading | playing | paused | done | error
  tab: 'log',
  meta: null,         // { sessionName, totalEvents, drivers[] }
  drivers: {},        // driverNumber → driver info
  _src: [],           // full sorted event array (replay source)
  emitted: [],        // events emitted so far
  positions: {},      // driverNumber → current position
  idx: 0,             // next index in _src
  speed: 10,
  filtTypes: [],      // [] = show all
  filtDriver: null,
  audio: {},          // eventId → Audio element
  // Live mode
  liveSession: null,
  liveTimer: null,
  lastPollTs: null,   // ISO string — fetch events newer than this
  // Idle polling
  idleTimer: null,
  // Countdown
  nextRace: null,
  countdownTimer: null,
};

let _timer = null;
let _seq   = 0;
const uid  = p => `${p}-${++_seq}`;

// ── OpenF1 helpers ───────────────────────────────────────────────────────────

async function get(ep, params = {}) {
  const u = new URL(`${API}/${ep}`);
  for (const [k,v] of Object.entries(params)) u.searchParams.set(k, String(v));
  const r = await fetch(u);
  if (r.status === 404 || r.status === 429) return [];
  if (!r.ok) throw new Error(`OpenF1 ${ep} → HTTP ${r.status}`);
  return r.json();
}

// Fetch with a date >= filter (live polling)
async function getFrom(ep, sk, dateField, since) {
  const url = `${API}/${ep}?session_key=${sk}&${dateField}>=${encodeURIComponent(since)}`;
  const r = await fetch(url);
  if (r.status === 404 || r.status === 429) return [];
  if (!r.ok) throw new Error(`${ep} HTTP ${r.status}`);
  return r.json();
}

function isLiveSession(session) {
  if (!session.date_end) return true;
  return new Date(session.date_end) > new Date();
}

// ── Normalization ────────────────────────────────────────────────────────────

const stripCol = c => c ? c.replace(/^#/,'') : null;
const fmtLap   = s => { const m = Math.floor(s/60), sec = (s%60).toFixed(3); return m ? `${m}:${sec.padStart(6,'0')}` : sec; };
const fmtTime  = iso => { const d = new Date(iso); return [d.getHours(),d.getMinutes(),d.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':'); };

function normLaps(laps, dm, sk) {
  const out = [], pb = {}, sb = { v: null };
  for (const lap of [...laps].sort((a,b) => +new Date(a.date_start) - +new Date(b.date_start))) {
    if (!lap.lap_duration || lap.lap_duration <= 0 || lap.is_pit_out_lap) continue;
    const isPB = !pb[lap.driver_number] || lap.lap_duration < pb[lap.driver_number];
    const isSB = !sb.v || lap.lap_duration < sb.v;
    if (isPB) pb[lap.driver_number] = lap.lap_duration;
    if (isSB) sb.v = lap.lap_duration;
    const ts  = new Date(+new Date(lap.date_start) + lap.lap_duration * 1000).toISOString();
    const drv = dm[lap.driver_number];
    const s1  = lap.duration_sector_1?.toFixed(3) ?? '---';
    const s2  = lap.duration_sector_2?.toFixed(3) ?? '---';
    const s3  = lap.duration_sector_3?.toFixed(3) ?? '---';
    out.push({ id:uid('L'), timestamp:ts, type:'LAP', sessionKey:sk,
      priority: isSB ? 2 : isPB ? 3 : 5,
      driverNumber: lap.driver_number, driverCode: drv?.name_acronym,
      teamColour: stripCol(drv?.team_colour),
      title: isSB ? `NEW FASTEST LAP — ${fmtLap(lap.lap_duration)}`
           : isPB ? `PERSONAL BEST — ${fmtLap(lap.lap_duration)}`
           :        `LAP ${lap.lap_number} — ${fmtLap(lap.lap_duration)}`,
      message: `S1 ${s1}  S2 ${s2}  S3 ${s3}  LAP ${lap.lap_number}`,
      payload: {} });
  }
  return out;
}

function normPos(positions, dm, sk) {
  const out = [], last = {};
  for (const p of [...positions].sort((a,b) => +new Date(a.date) - +new Date(b.date))) {
    if (last[p.driver_number] === p.position) continue;
    last[p.driver_number] = p.position;
    const drv = dm[p.driver_number];
    out.push({ id:uid('P'), timestamp:p.date, type:'POSITION', sessionKey:sk,
      priority:4, driverNumber:p.driver_number, driverCode:drv?.name_acronym,
      teamColour:stripCol(drv?.team_colour), title:`P${p.position}`,
      payload:{ position:p.position } });
  }
  return out;
}

function normRC(rcs, dm, sk) {
  return rcs.map(rc => {
    const msg = rc.message.toUpperCase();
    const p   = msg.includes('RED FLAG')||msg.includes('SESSION STOPPED') ? 1
              : msg.includes('YELLOW')||msg.includes('VSC')||msg.includes('SAFETY CAR') ? 2
              : msg.includes('DELETED')||msg.includes('TRACK LIMITS')||msg.includes('PENALTY') ? 3
              : 4;
    const drv   = rc.driver_number != null ? dm[rc.driver_number] : null;
    const title = rc.flag ? `${rc.flag.replace(/_/g,' ')} FLAG`
                : rc.message.length > 60 ? rc.message.slice(0,57)+'…' : rc.message;
    return { id:uid('R'), timestamp:rc.date, type:'RACE_CONTROL', sessionKey:sk,
      priority:p, driverNumber:rc.driver_number, driverCode:drv?.name_acronym,
      teamColour:stripCol(drv?.team_colour), title,
      message: rc.message !== title ? rc.message : null, payload:{} };
  });
}

function normWx(wx, sk) {
  const out = []; let lastMs = 0;
  for (const w of [...wx].sort((a,b) => +new Date(a.date) - +new Date(b.date))) {
    const ms = +new Date(w.date);
    if (ms - lastMs < 5*60*1000) continue;
    lastMs = ms;
    out.push({ id:uid('W'), timestamp:w.date, type:'WEATHER', sessionKey:sk,
      priority:5, title:`TRACK ${w.track_temperature.toFixed(0)}°C  AIR ${w.air_temperature.toFixed(0)}°C${w.rainfall>0?' 🌧':''}`,
      message:`Wind ${w.wind_speed.toFixed(1)} m/s  Humidity ${w.humidity.toFixed(0)}%`, payload:{} });
  }
  return out;
}

function normRadio(radios, dm, sk) {
  return radios.map(r => {
    const drv = dm[r.driver_number];
    return { id:uid('A'), timestamp:r.date, type:'RADIO', sessionKey:sk,
      priority:3, driverNumber:r.driver_number, driverCode:drv?.name_acronym,
      teamColour:stripCol(drv?.team_colour), title:'RADIO RECORDING AVAILABLE',
      recordingUrl:r.recording_url, payload:{} };
  });
}

function normAll(session, { drivers, laps, positions, raceControl, weather, teamRadio }) {
  const sk  = session.session_key;
  const dm  = {};
  for (const d of drivers) dm[d.driver_number] = d;

  const driverInfos = drivers.map(d => ({
    driverNumber: d.driver_number, code: d.name_acronym, fullName: d.full_name,
    teamName: d.team_name, teamColour: stripCol(d.team_colour) ?? '888888',
  }));

  const events = [
    { id:uid('S'), timestamp:session.date_start, type:'SYSTEM', sessionKey:sk, priority:2,
      title:`SESSION START — ${session.session_name.toUpperCase()}`,
      message:`${session.circuit_short_name.toUpperCase()} · ${session.country_name.toUpperCase()} · ${session.year}`,
      payload:{} },
    ...normLaps(laps, dm, sk),
    ...normPos(positions, dm, sk),
    ...normRC(raceControl, dm, sk),
    ...normWx(weather, sk),
    ...normRadio(teamRadio, dm, sk),
    ...(session.date_end ? [{ id:uid('S'), timestamp:session.date_end, type:'SYSTEM', sessionKey:sk,
      priority:2, title:'SESSION END — CHEQUERED FLAG', payload:{} }] : []),
  ].sort((a,b) => +new Date(a.timestamp) - +new Date(b.timestamp));

  return { sessionName:`${session.session_name} — ${session.circuit_short_name} ${session.year}`,
           totalEvents:events.length, drivers:driverInfos, events };
}

// ── Replay engine ────────────────────────────────────────────────────────────

function tick() {
  if (S.phase !== 'playing') return;
  if (S.idx >= S._src.length) { S.phase = 'done'; updateHdr(); renderMenu(); if (!S.idleTimer) S.idleTimer = setInterval(checkForLive, 60000); return; }

  const ev = S._src[S.idx++];
  emit(ev);

  if (S.idx >= S._src.length) { S.phase = 'done'; updateHdr(); renderMenu(); if (!S.idleTimer) S.idleTimer = setInterval(checkForLive, 60000); return; }

  const delta = +new Date(S._src[S.idx].timestamp) - +new Date(ev.timestamp);
  const delay = Math.min(Math.max(0, delta) / S.speed, MAX_GAP);
  _timer = setTimeout(tick, delay);
}

function emit(ev) {
  S.emitted.push(ev);
  if (ev.type === 'POSITION' && ev.driverNumber != null && ev.payload.position != null) {
    S.positions[ev.driverNumber] = ev.payload.position;
  }
  if (visible(ev)) {
    if (S.tab === 'log')   appendRow(ev);
    if (S.tab === 'radio' && ev.type === 'RADIO') appendRadioRow(ev);
  }
  if (S.tab === 'grid') renderGrid();
  updateHdr();
}

function visible(ev) {
  const tOk = S.filtTypes.length === 0 || S.filtTypes.includes(ev.type);
  const dOk = S.filtDriver == null || ev.driverNumber === S.filtDriver;
  return tOk && dOk;
}

function pause()  {
  S.phase='paused';
  clearTimeout(_timer); _timer=null;
  if (S.liveTimer) { clearInterval(S.liveTimer); S.liveTimer=null; }
  updateHdr(); renderMenu();
}
function resume() {
  if (S.phase!=='paused') return;
  S.phase='playing';
  if (S.liveSession) {
    S.liveTimer = setInterval(pollLive, 10000);
    pollLive();
  } else {
    tick();
  }
  updateHdr(); renderMenu();
}
function reset()  {
  clearTimeout(_timer); _timer=null;
  if (S.liveTimer) { clearInterval(S.liveTimer); S.liveTimer=null; }
  S.liveSession=null; S.lastPollTs=null;
  S.idx=0; S.emitted=[]; S.positions={}; S.phase='playing';
  if (S.tab==='log') { document.getElementById('main').innerHTML=''; }
  else renderTab();
  updateHdr();
  tick();
}
function setSpd(v) { S.speed=v; renderMenu(); }

// ── Live mode ────────────────────────────────────────────────────────────────

async function pollLive() {
  if (S.phase !== 'playing' || !S.liveSession) return;
  const sk = S.liveSession.session_key;
  const since = S.lastPollTs;
  if (!since) return;

  try {
    const [newLaps, newPos, newRC, newWx, newRadio] = await Promise.all([
      getFrom('laps',         sk, 'date_start', since),
      getFrom('position',     sk, 'date',        since),
      getFrom('race_control', sk, 'date',        since),
      getFrom('weather',      sk, 'date',        since),
      getFrom('team_radio',   sk, 'date',        since),
    ]);

    // Build driver map compatible with norm functions
    const dm = {};
    for (const d of Object.values(S.drivers)) {
      dm[d.driverNumber] = { name_acronym: d.code, team_colour: d.teamColour };
    }

    const events = [
      ...normLaps(newLaps, dm, sk),
      ...normPos(newPos, dm, sk),
      ...normRC(newRC, dm, sk),
      ...normWx(newWx, sk),
      ...normRadio(newRadio, dm, sk),
    ].sort((a,b) => +new Date(a.timestamp) - +new Date(b.timestamp));

    for (const ev of events) emit(ev);

    // Advance poll timestamp to latest received
    const allTs = [
      ...newLaps.map(x => x.date_start),
      ...newPos.map(x => x.date),
      ...newRC.map(x => x.date),
      ...newWx.map(x => x.date),
      ...newRadio.map(x => x.date),
    ].filter(Boolean).sort();
    if (allTs.length) {
      S.lastPollTs = new Date(+new Date(allTs.at(-1)) + 1).toISOString();
    }

    // Check if session ended
    if (S.liveSession.date_end && new Date(S.liveSession.date_end) < new Date()) {
      clearInterval(S.liveTimer); S.liveTimer=null; S.liveSession=null;
      S.phase='done'; updateHdr(); renderMenu();
      if (!S.idleTimer) S.idleTimer = setInterval(checkForLive, 60000);
    }
  } catch(e) {
    console.error('Live poll error:', e);
  }
}

async function startLiveMode(session) {
  S.liveSession = session;
  S.phase = 'playing';

  // Set poll start just after the last already-loaded event
  if (S._src.length > 0) {
    S.lastPollTs = new Date(+new Date(S._src[S._src.length-1].timestamp) + 1).toISOString();
  } else {
    S.lastPollTs = new Date(Date.now() - 30000).toISOString();
  }

  // Emit all pre-loaded events instantly
  for (const ev of S._src) emit(ev);

  setTab('log');
  updateHdr();

  S.liveTimer = setInterval(pollLive, 10000);
  setTimeout(pollLive, 1500); // first poll after brief delay
}

// ── DOM helpers ───────────────────────────────────────────────────────────────

const esc = s => s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';

function setBootMsg(t) {
  const el = document.getElementById('boot-msg');
  if (el) el.textContent = t;
}

function updateHdr() {
  const s  = document.getElementById('hdr-session');
  const st = document.getElementById('hdr-status');
  if (s && S.meta) s.textContent = S.meta.sessionName.toUpperCase();
  if (st) {
    const { phase, idx, meta } = S;
    const [txt, col] =
      phase === 'loading'  ? ['LOADING…',         '#666']
    : phase === 'error'    ? ['ERROR',            '#cc3333']
    : phase === 'standby'  ? ['STANDBY',          '#666']
    : phase === 'playing' && S.liveSession
                           ? [`● LIVE  ${S.emitted.length} EVT`, '#39d353']
    : phase === 'playing'  ? [`REPLAY  ${idx}/${meta?.totalEvents??0}`, '#39d353']
    : phase === 'paused'   ? ['PAUSED',           '#e8c133']
    : phase === 'done'     ? [S.liveSession ? 'SESSION ENDED' : 'REPLAY DONE', '#666']
    :                        ['STANDBY',          '#666'];
    st.textContent = txt;
    st.style.color = col;
  }
}

function accent(ev) { return ev.teamColour ? `#${ev.teamColour}` : '#444'; }
function pCol(p)    { return P_COLOR[p] ?? '#c8c8c8'; }

// ── Log renderers ─────────────────────────────────────────────────────────────

function renderLog() {
  const m = document.getElementById('main');
  if (!S.meta)          { m.innerHTML=`<div class="empty"><div class="empty-t">AWAITING SESSION...</div></div>`; return; }
  const vs = S.emitted.filter(visible);
  if (!vs.length)       { m.innerHTML=`<div class="empty"><div class="empty-t">AWAITING EVENTS...</div></div>`; return; }
  m.innerHTML = vs.map(rowHTML).join('');
  m.scrollTop = m.scrollHeight;
}

function appendRow(ev) {
  const m = document.getElementById('main');
  const e = m.querySelector('.empty, .notice, .screen-center');
  if (e) m.innerHTML = '';
  m.insertAdjacentHTML('beforeend', rowHTML(ev));
  m.scrollTop = m.scrollHeight;
}

function rowHTML(ev) {
  const ac = accent(ev), pc = pCol(ev.priority), hi = ev.priority <= 2;
  return `<div class="ev${hi?' hi':''}" style="border-left-color:${ac}">
    <div class="ev-meta">
      <div class="ev-time">${fmtTime(ev.timestamp)}</div>
      <div class="ev-badge" style="color:${pc}">${BADGE[ev.type]??ev.type.slice(0,3)}</div>
    </div>
    <div class="ev-body">
      ${ev.driverCode?`<div class="ev-drv" style="color:${ac}">${esc(ev.driverCode)}</div>`:''}
      <div class="ev-ttl" style="color:${pc}">${esc(ev.title)}</div>
      ${ev.message?`<div class="ev-msg">${esc(ev.message)}</div>`:''}
    </div>
    ${hi?`<div class="ev-pip" style="background:${pc}"></div>`:''}
  </div>`;
}

// ── Radio renderers ───────────────────────────────────────────────────────────

function renderRadio() {
  const m = document.getElementById('main');
  if (!S.meta) { m.innerHTML=`<div class="notice"><div class="notice-t">AWAITING SESSION DATA</div></div>`; return; }
  const clips = S.emitted.filter(e => e.type==='RADIO');
  if (!clips.length) {
    m.innerHTML=`<div class="notice">
      <div class="notice-t">NO RADIO DATA AVAILABLE</div>
      <div class="notice-b">Team radio recordings are not publicly available for this session. This may be due to broadcast rights or delayed release.</div>
    </div>`; return;
  }
  m.innerHTML = clips.map(radioHTML).join('');
}

function appendRadioRow(ev) {
  const m = document.getElementById('main');
  const e = m.querySelector('.notice, .empty, .screen-center');
  if (e) m.innerHTML = '';
  m.insertAdjacentHTML('beforeend', radioHTML(ev));
}

function radioHTML(ev) {
  const ac = accent(ev);
  const pl = S.audio[ev.id];
  const playing = pl && !pl.paused;
  return `<div class="rad" style="border-left-color:${ac}" id="rad-${ev.id}">
    <div class="rad-info">
      <div class="rad-time">${fmtTime(ev.timestamp)}</div>
      ${ev.driverCode?`<div class="rad-drv" style="color:${ac}">${esc(ev.driverCode)}</div>`:''}
      <div class="rad-ttl">${esc(ev.title)}</div>
    </div>
    <button class="play-btn" style="color:${ac}" onclick="toggleAudio('${ev.id}','${ev.recordingUrl}')">${playing?'▐▐':'▶'}</button>
  </div>`;
}

function toggleAudio(id, url) {
  for (const [k, a] of Object.entries(S.audio)) { if (k!==id && !a.paused) { a.pause(); syncAudioBtn(k); } }
  if (!S.audio[id]) {
    const a = new Audio(url);
    a.onended = () => syncAudioBtn(id);
    S.audio[id] = a;
  }
  const a = S.audio[id];
  if (a.paused) { a.play().catch(()=>{}); setTimeout(()=>syncAudioBtn(id),80); }
  else          { a.pause(); syncAudioBtn(id); }
}

function syncAudioBtn(id) {
  const row = document.getElementById(`rad-${id}`);
  if (!row) return;
  const a = S.audio[id];
  row.querySelector('.play-btn').textContent = (a && !a.paused) ? '▐▐' : '▶';
}

// ── Grid renderer ─────────────────────────────────────────────────────────────

function renderGrid() {
  const m = document.getElementById('main');
  if (!S.meta) { m.innerHTML=`<div class="empty"><div class="empty-t">AWAITING SESSION...</div></div>`; return; }
  const rows = S.meta.drivers
    .map(d => ({ ...d, pos: S.positions[d.driverNumber] ?? 99 }))
    .sort((a,b) => a.pos - b.pos);
  m.innerHTML = `
    <div class="grid-lbl">
      <span style="width:24px;text-align:right">#</span>
      <span style="width:48px;margin-left:12px">DRV</span>
      <span style="flex:1;margin-left:12px">TEAM</span>
    </div>
    ${rows.map((d,i) => `
      <div class="drv-row" style="border-left-color:#${d.teamColour}">
        <div class="drv-pos">${d.pos===99?i+1:d.pos}</div>
        <div class="drv-code" style="color:#${d.teamColour}">${esc(d.code)}</div>
        <div class="drv-team">${esc(d.teamName.toUpperCase())}</div>
      </div>`).join('')}`;
}

// ── Menu renderer ─────────────────────────────────────────────────────────────

function renderMenu() {
  const m = document.getElementById('main');
  const playing = S.phase === 'playing';
  const drvList = (S.meta?.drivers ?? []).slice().sort((a,b) => a.code.localeCompare(b.code));
  m.innerHTML = `<div class="menu-wrap">

    <div class="menu-sec">
      <div class="menu-ttl">SESSION</div>
      <div class="sess-row">
        <input id="sk-input" type="text" placeholder="session key or 'latest'" value="latest">
        <button onclick="loadSession()">LOAD</button>
      </div>
    </div>

    <div class="menu-sec">
      <div class="menu-ttl">REPLAY</div>
      <div class="speed-row">
        ${[10,20,50].map(v=>`<button class="spd-btn${S.speed===v?' on':''}" onclick="setSpd(${v})">${v}x</button>`).join('')}
      </div>
      <div class="act-row">
        <button class="act-btn" onclick="${playing?'pause':'resume'}()">${playing?'PAUSE':'RESUME'}</button>
        <button class="act-btn danger" onclick="reset()">RESET</button>
      </div>
    </div>

    <div class="menu-sec">
      <div class="menu-ttl">EVENT TYPES</div>
      ${ALL_TYPES.map(({label,v}) => {
        const on = S.filtTypes.length===0 || S.filtTypes.includes(v);
        return `<div class="tog-row${on?' on':''}" onclick="toggleType('${v}')">
          <span class="tog-lbl">${label}</span><span class="tog-pip"></span>
        </div>`;
      }).join('')}
      ${S.filtTypes.length ? `<button class="clear-btn" onclick="clearTypes()">SHOW ALL</button>` : ''}
    </div>

    ${drvList.length ? `
    <div class="menu-sec">
      <div class="menu-ttl">DRIVER FILTER</div>
      <div class="tog-row${S.filtDriver==null?' on':''}" onclick="setDrv(null)">
        <span class="tog-lbl">ALL DRIVERS</span><span class="tog-pip"></span>
      </div>
      ${drvList.map(d=>`
        <div class="tog-row${S.filtDriver===d.driverNumber?' on':''}" onclick="setDrv(${d.driverNumber})">
          <span class="tog-lbl">${esc(d.code)}  ${esc(d.fullName.toUpperCase())}</span>
          <span class="tog-pip"></span>
        </div>`).join('')}
    </div>` : ''}

  </div>`;
}

// ── Filter handlers ───────────────────────────────────────────────────────────

function toggleType(v) {
  S.filtTypes = S.filtTypes.includes(v) ? S.filtTypes.filter(t=>t!==v) : [...S.filtTypes,v];
  renderTab();
}
function clearTypes() { S.filtTypes=[]; renderTab(); }
function setDrv(n) { S.filtDriver = (S.filtDriver===n)?null:n; renderTab(); }

// ── Tab routing ───────────────────────────────────────────────────────────────

function setTab(t) {
  S.tab = t;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab===t));
  renderTab();
}

function renderTab() {
  if (S.phase==='loading') return;
  ({ log:renderLog, radio:renderRadio, grid:renderGrid, menu:renderMenu })[S.tab]?.();
}

// ── Session loader ────────────────────────────────────────────────────────────

function showIdle() {
  S.phase = 'standby';
  updateHdr();
  document.getElementById('main').innerHTML = `<div class="screen-center">
    <div class="sc-title">PITWALL.EXE</div>
    <div class="sc-status">NO LIVE SESSION<br><br>Checking every minute…</div>
  </div>`;
  if (S.idleTimer) clearInterval(S.idleTimer);
  S.idleTimer = setInterval(checkForLive, 60000);
}

// Silently check if a session has gone live — used from both idle and done states
async function checkForLive() {
  try {
    const list = await get('sessions', { year: new Date().getFullYear() });
    const now = new Date();
    const live = list.find(s => new Date(s.date_start) <= now && isLiveSession(s));
    if (live) loadSession();
  } catch(e) { /* ignore */ }
}

async function loadSession() {
  // If triggered manually (from menu), clear idle polling
  if (S.idleTimer) { clearInterval(S.idleTimer); S.idleTimer=null; }
  clearTimeout(_timer); _timer=null;
  if (S.liveTimer) { clearInterval(S.liveTimer); S.liveTimer=null; }
  Object.assign(S, { phase:'loading', meta:null, _src:[], emitted:[], positions:{}, idx:0, audio:{}, liveSession:null, lastPollTs:null });
  document.getElementById('main').innerHTML = `<div class="screen-center">
    <div class="sc-title">PITWALL.EXE</div>
    <div class="sc-status" id="boot-msg">Connecting to OpenF1...</div>
  </div>`;
  updateHdr();

  try {
    const _urlSk = new URLSearchParams(location.search).get('sk');
    const key = _urlSk || document.getElementById('sk-input')?.value?.trim() || 'latest';
    let session;

    setBootMsg('Fetching sessions…');
    if (key === 'latest') {
      // Only auto-load if a session is actually live right now
      const list = await get('sessions', { year: new Date().getFullYear() });
      list.sort((a,b) => +new Date(b.date_start) - +new Date(a.date_start));
      const now = new Date();
      const live = list.find(s => new Date(s.date_start) <= now && isLiveSession(s));
      if (!live) { showIdle(); return; }
      session = live;
    } else {
      const list = await get('sessions', { session_key: key });
      session = list[0];
      if (!session) throw new Error(`Session ${key} not found.`);
    }

    setBootMsg(`Loading ${session.session_name}…`);
    const safe = p => p.catch(() => []);
    const [drivers, laps, positions, raceControl, weather, teamRadio] = await Promise.all([
      safe(get('drivers',      { session_key: session.session_key })),
      safe(get('laps',         { session_key: session.session_key })),
      safe(get('position',     { session_key: session.session_key })),
      safe(get('race_control', { session_key: session.session_key })),
      safe(get('weather',      { session_key: session.session_key })),
      safe(get('team_radio',   { session_key: session.session_key })),
    ]);

    setBootMsg('Normalizing…');
    const norm = normAll(session, { drivers, laps, positions, raceControl, weather, teamRadio });

    S.meta  = { sessionName: norm.sessionName, totalEvents: norm.totalEvents, drivers: norm.drivers };
    S.drivers = {};
    for (const d of norm.drivers) S.drivers[d.driverNumber] = d;
    S._src  = norm.events;
    S.idx   = 0;
    S.emitted = [];
    S.positions = {};

    if (isLiveSession(session)) {
      setBootMsg(`● LIVE — ${session.session_name}…`);
      await startLiveMode(session);
    } else {
      S.phase = 'playing';
      setTab('log');
      updateHdr();
      tick();
    }

  } catch (err) {
    S.phase = 'error';
    document.getElementById('main').innerHTML = `<div class="screen-center">
      <div class="sc-title">PITWALL.EXE</div>
      <div class="sc-error">${esc(err.message)}<br><br>Retrying in 15 seconds…</div>
    </div>`;
    updateHdr();
    // Auto-retry after 15s (handles transient OpenF1 failures during live races)
    if (S.idleTimer) clearInterval(S.idleTimer);
    S.idleTimer = setTimeout(loadSession, 15000);
  }
}

// ── Countdown ─────────────────────────────────────────────────────────────────

async function fetchNextRace() {
  try {
    const year = new Date().getFullYear();
    const sessions = await get('sessions', { year });
    const now = new Date();
    // Find the next scheduled Race session (not a live one — that's handled by loadSession)
    const upcoming = sessions
      .filter(s => s.session_name === 'Race' && new Date(s.date_start) > now)
      .sort((a,b) => +new Date(a.date_start) - +new Date(b.date_start));
    if (upcoming.length) {
      const s = upcoming[0];
      S.nextRace = {
        label: `${(s.meeting_name || s.circuit_short_name).toUpperCase()} · ${s.country_name.toUpperCase()}`,
        dateStart: new Date(s.date_start),
      };
      if (S.countdownTimer) clearInterval(S.countdownTimer);
      updateCountdown();
      S.countdownTimer = setInterval(updateCountdown, 1000);
    }
  } catch(e) { /* silently ignore */ }
}

function updateCountdown() {
  const bar   = document.getElementById('countdown-bar');
  if (!bar || !S.nextRace) return;
  const diff = S.nextRace.dateStart - Date.now();
  if (diff <= 0) {
    bar.style.display = 'none';
    clearInterval(S.countdownTimer); S.countdownTimer = null;
    // Refresh — the race may now be live
    fetchNextRace();
    return;
  }
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  const parts = d > 0
    ? `${d}D ${String(h).padStart(2,'0')}H ${String(m).padStart(2,'0')}M`
    : `${String(h).padStart(2,'0')}H ${String(m).padStart(2,'0')}M ${String(s).padStart(2,'0')}S`;
  bar.style.display = 'flex';
  bar.querySelector('.cd-label').textContent = `NEXT RACE · ${S.nextRace.label}`;
  bar.querySelector('.cd-timer').textContent = parts;
}

// ── Boot ──────────────────────────────────────────────────────────────────────

document.querySelectorAll('.tab').forEach(b => b.addEventListener('click', () => setTab(b.dataset.tab)));

// Support ?sk=XXXXX URL parameter
const _urlSk = new URLSearchParams(location.search).get('sk');
if (_urlSk) { const inp = document.getElementById('sk-input'); if (inp) inp.value = _urlSk; }

fetchNextRace();
loadSession();
</script>
